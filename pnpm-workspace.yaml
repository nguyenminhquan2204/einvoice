autoInstallPeers: true

# pnpm 10+ mặc định chặn build script của dependencies và coi đó là lỗi cứng
# (ERR_PNPM_IGNORED_BUILDS) trên môi trường non-interactive như CI.
# onlyBuiltDependencies/ignoredBuiltDependencies KHÔNG dập được lỗi này ở pnpm 11.x
# khi store đã cache trạng thái "chưa build", nên cho phép chạy toàn bộ build script
# (các dependency này đã nằm trong lockfile và được project tin dùng).
dangerouslyAllowAllBuilds: true
